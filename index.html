<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --warn: #f59e0b;
      --radius: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: calc(16px + var(--safe-top)) 20px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    .stats {
      display: flex;
      gap: 12px;
    }

    .stat {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .stat strong { color: var(--text); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Task list ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
      padding-top: 40px;
    }

    .empty-icon { font-size: 3rem; }
    .empty p { font-size: 0.9rem; }

    /* ── Task card ── */
    .task {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: opacity 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task.done { opacity: 0.5; }
    .task.done .task-title { text-decoration: line-through; color: var(--text-muted); }

    .task::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .task[data-priority="high"]::before { background: var(--danger); }
    .task[data-priority="medium"]::before { background: var(--warn); }
    .task[data-priority="low"]::before { background: var(--success); }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .task.done .check-btn {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 0.95rem; font-weight: 500; line-height: 1.4; word-break: break-word; }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .tag-cat {
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      color: #a5b4fc;
    }

    .tag-due {
      background: color-mix(in srgb, var(--warn) 15%, transparent);
      color: var(--warn);
    }

    .tag-due.overdue {
      background: color-mix(in srgb, var(--danger) 20%, transparent);
      color: var(--danger);
    }

    .tag-priority-high { background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); }
    .tag-priority-medium { background: color-mix(in srgb, var(--warn) 20%, transparent); color: var(--warn); }
    .tag-priority-low { background: color-mix(in srgb, var(--success) 20%, transparent); color: var(--success); }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 1rem;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .delete-btn:hover, .delete-btn:active { color: var(--danger); }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bot));
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.93); background: var(--accent-dim); }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 20;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px calc(24px + var(--safe-bot));
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    }

    .overlay.open .sheet {
      transform: translateY(0);
    }

    .sheet h2 { font-size: 1.1rem; margin-bottom: 18px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

    .field input, .field select {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }

    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
    }

    .field select option { background: var(--surface2); }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .btn-primary:active { background: var(--accent-dim); }

    /* ── Category chips in form ── */
    .cat-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cat-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .cat-chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <h1>My <span>Tasks</span></h1>
      <div class="stats">
        <div class="stat"><strong id="stat-done">0</strong> done</div>
        <div class="stat"><strong id="stat-left">0</strong> left</div>
      </div>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
      <button class="filter-btn" data-filter="high">🔴 High</button>
      <button class="filter-btn" data-filter="medium">🟡 Medium</button>
      <button class="filter-btn" data-filter="low">🟢 Low</button>
    </div>
  </header>

  <main id="task-list"></main>

  <button class="fab" id="fab" aria-label="Add task">+</button>
</div>

<!-- Add Task Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h2>New Task</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="input-title" placeholder="What needs to be done?" maxlength="120" />
    </div>
    <div class="row">
      <div class="field">
        <label>Priority</label>
        <select id="input-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="field">
        <label>Due date</label>
        <input type="date" id="input-due" />
      </div>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="cat-chips" id="cat-chips">
        <button class="cat-chip selected" data-cat="Personal">Personal</button>
        <button class="cat-chip" data-cat="Work">Work</button>
        <button class="cat-chip" data-cat="Shopping">Shopping</button>
        <button class="cat-chip" data-cat="Health">Health</button>
        <button class="cat-chip" data-cat="Finance">Finance</button>
      </div>
    </div>
    <button class="btn-primary" id="btn-add">Add Task</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';
  let selectedCat = 'Personal';

  const save = () => localStorage.setItem('tasks', JSON.stringify(tasks));

  // ── Render ─────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('task-list');
    const today = new Date().toISOString().slice(0, 10);

    const visible = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      if (filter === 'high') return t.priority === 'high' && !t.done;
      if (filter === 'medium') return t.priority === 'medium' && !t.done;
      if (filter === 'low') return t.priority === 'low' && !t.done;
      return true;
    });

    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-left').textContent = tasks.length - done;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Nothing here — enjoy the peace!</p></div>`;
      return;
    }

    list.innerHTML = visible.map(t => {
      const overdue = t.due && t.due < today && !t.done;
      const dueLabel = t.due
        ? `<span class="tag tag-due ${overdue ? 'overdue' : ''}">${overdue ? '⚠ ' : ''}${formatDate(t.due)}</span>`
        : '';
      return `
        <div class="task ${t.done ? 'done' : ''}" data-priority="${t.priority}" data-id="${t.id}">
          <button class="check-btn" onclick="toggle('${t.id}')" aria-label="Toggle">
            ${t.done ? '✓' : ''}
          </button>
          <div class="task-body">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-meta">
              <span class="tag tag-cat">${escHtml(t.cat)}</span>
              <span class="tag tag-priority-${t.priority}">${t.priority}</span>
              ${dueLabel}
            </div>
          </div>
          <button class="delete-btn" onclick="remove('${t.id}')" aria-label="Delete">✕</button>
        </div>`;
    }).join('');
  }

  function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y.slice(2)}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ────────────────────────────────────────────────────────
  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function addTask() {
    const title = document.getElementById('input-title').value.trim();
    if (!title) { document.getElementById('input-title').focus(); return; }

    tasks.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      title,
      priority: document.getElementById('input-priority').value,
      due: document.getElementById('input-due').value || null,
      cat: selectedCat,
      done: false,
      created: Date.now()
    });

    save(); render(); closeSheet();
  }

  // ── Sheet ──────────────────────────────────────────────────────────
  function openSheet() {
    document.getElementById('input-title').value = '';
    document.getElementById('input-priority').value = 'medium';
    document.getElementById('input-due').value = '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 300);
  }

  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
  }

  // ── Wire-up ────────────────────────────────────────────────────────
  document.getElementById('fab').addEventListener('click', openSheet);
  document.getElementById('btn-add').addEventListener('click', addTask);

  document.getElementById('input-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeSheet();
  });

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  document.getElementById('cat-chips').addEventListener('click', e => {
    const chip = e.target.closest('.cat-chip');
    if (!chip) return;
    selectedCat = chip.dataset.cat;
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });

  // ── Service Worker ─────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  render();
</script>
</body>
</html>
